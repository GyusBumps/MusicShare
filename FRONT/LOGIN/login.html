<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2 id="form-title">로그인</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="아이디 입력" required>
            <input type="password" id="password" placeholder="비밀번호 입력" required>
            <button type="submit" id="submit-btn">로그인</button>
            <p style="margin-top: 15px; font-size: 14px;">
                <span id="toggle-msg">아직 회원이 아니신가요?</span>
                <a href="#" id="toggle-auth" style="color: #007bff; text-decoration: none; font-weight: bold;">회원가입</a>
            </p>
        </form>
        <p><a href="../MAIN/main.html" style="color: #666; text-decoration: none; font-size: 14px;">홈으로 가기</a></p>
    </div>
    <script src="login.js"></script>
</body>
</html>
